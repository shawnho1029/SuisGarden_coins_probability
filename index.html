<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuisGarden 通寶機率計算器</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: #1e293b;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        #results-container {
            margin-top: 25px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
        }

        .result-item {
            margin-bottom: 10px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 6px;
        }

        .winner-box {
            background: #dcfce7;
            border: 1px solid #22c55e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .winner-title {
            font-weight: bold;
            color: #166534;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎴 通寶機率計算器</h1>

        <div class="input-group">
            <label>擁有 [花錢 衡錢 厲錢]</label>
            <input type="text" id="counts" value="3 4 3" placeholder="例如: 3 4 3">
        </div>

        <div class="input-group">
            <label>擲出通寶總數 (n)</label>
            <input type="number" id="n_val" value="3" min="1">
        </div>

        <div class="input-group">
            <label>需求組合 (每行一組組合，格式: 花 衡 厲)</label>
            <textarea id="requires" placeholder="例如:&#10;2 1 0&#10;0 2 1"></textarea>
        </div>

        <button onclick="runCalculation()">開始計算機率</button>

        <div id="results-container" style="display: none;">
            <div id="prob-list"></div>
            <div id="winner-info" class="winner-box"></div>
        </div>
    </div>

    <script>
        // --- 核心數學模塊 ---
        const factorial = (n) => {
            if (n < 0) return 0;
            let res = 1;
            for (let i = 2; i <= n; i++) res *= i;
            return res;
        };

        // 邏輯遷移：與你的 Python get_cumulative_multinomial_probs 完全對應
        function getMultinomialProb(n, probs, reqs) {
            const [p1, p2, p3] = probs;
            const [r1, r2, r3] = reqs;
            if (reqs.reduce((a, b) => a + b, 0) > n) return 0;

            let probSum = 0;
            // 使用與 Python 版本相同的邊界優化 range
            for (let k1 = r1; k1 <= n - r2 - r3; k1++) {
                for (let k2 = r2; k2 <= n - k1 - r3; k2++) {
                    let k3 = n - k1 - k2;
                    // 多項式係數公式: n! / (k1! * k2! * k3!)
                    let coef = factorial(n) / (factorial(k1) * factorial(k2) * factorial(k3));
                    probSum += coef * Math.pow(p1, k1) * Math.pow(p2, k2) * Math.pow(p3, k3);
                }
            }
            return probSum;
        }

        // --- UI 處理模塊 ---
        function runCalculation() {
            const counts = document.getElementById('counts').value.trim().split(/\s+/).map(Number);
            const n = parseInt(document.getElementById('n_val').value);
            const reqLines = document.getElementById('requires').value.trim().split('\n').filter(l => l.trim());

            if (counts.length !== 3) {
                alert("請確保『擁有數量』輸入了 3 個數字");
                return;
            }

            const totalCoins = counts.reduce((a, b) => a + b, 0);
            const baseProbs = counts.map(c => c / totalCoins);
            const coinNames = ['花錢', '衡錢', '厲錢'];

            let results = [];
            reqLines.forEach((line, index) => {
                const req = line.trim().split(/\s+/).map(Number);
                if (req.length === 3) {
                    const p = getMultinomialProb(n, baseProbs, req);
                    results.push({
                        prob: p,
                        label: `選項${index + 1} (${coinNames[0]}:${req[0]} ${coinNames[1]}:${req[1]} ${coinNames[2]}:${req[2]})`
                    });
                }
            });

            if (results.length === 0) {
                alert("請至少輸入一組有效需求組合");
                return;
            }

            displayResults(results);
        }

        function displayResults(results) {
            const container = document.getElementById('results-container');
            const listDiv = document.getElementById('prob-list');
            const winnerDiv = document.getElementById('winner-info');

            container.style.display = 'block';
            listDiv.innerHTML = '<h3>📊 各項機率</h3>';

            results.forEach(res => {
                listDiv.innerHTML += `
                <div class="result-item">
                    <strong>${res.label}</strong><br>
                    機率: ${(res.prob * 100).toFixed(2)}%
                </div>
            `;
            });

            // 處理並列最高機率的邏輯
            const maxP = Math.max(...results.map(r => r.prob));
            const winners = results.filter(r => r.prob === maxP).map(r => r.label);

            if (maxP === 0) {
                winnerDiv.innerHTML = `<span class="winner-title">💡 結論</span>所有選項機率皆為 0%`;
            } else {
                winnerDiv.innerHTML = `
                <span class="winner-title">💡 結論 (${(maxP * 100).toFixed(2)}%)</span>
                ${winners.length > 1 ? '並列最高：' : ''} ${winners.join('、')}
            `;
            }
        }
    </script>

</body>

</html>
