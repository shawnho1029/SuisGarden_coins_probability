<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuisGarden | 通寶機率計算器</title>
    <style>
        /* 顏色變數：參考明日方舟 UI 色調 */
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --accent-cyan: #00e5ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border-color: #333333;
            --input-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .terminal-container {
            width: 100%;
            max-width: 800px;
            border-left: 4px solid var(--accent-cyan);
            padding-left: 20px;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

        h1::before {
            content: "";
            width: 4px;
            height: 24px;
            background: var(--accent-cyan);
            margin-right: 12px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .module-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            position: relative;
        }

        .module-title {
            color: var(--accent-cyan);
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-cyan);
            outline: none;
        }

        button {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--accent-cyan);
            color: #000;
        }

        #result-display {
            margin-top: 30px;
            border-top: 1px solid var(--accent-cyan);
            padding-top: 20px;
        }

        .result-row {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }

        .winner-panel {
            margin-top: 20px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--accent-cyan);
            padding: 15px;
        }

        @media (max-width: 600px) {
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <h1>明日方舟機率計算器 (Integrated Strategy Logic)</h1>

    <div class="grid-layout">
        <div class="module-card">
            <div class="module-title">通寶配置 (Operator)</div>
            <div class="input-group">
                <label>擁有比例 [花錢 衡錢 厲錢]</label>
                <input type="text" id="counts" value="3 4 3">
            </div>
            <div class="input-group">
                <label>擲出數量 (n)</label>
                <input type="number" id="n_val" value="3">
            </div>
        </div>

        <div class="module-card">
            <div class="module-title">敵方需求 (Enemy)</div>
            <div class="input-group">
                <label>需求組合 (每行一組組合: 花 衡 厲)</label>
                <textarea id="requires" placeholder="例如: 1 1 1"></textarea>
            </div>
        </div>
    </div>

    <button onclick="runCalculation()">開始邏輯演算 (Initiate Logic)</button>

    <div id="result-display" style="display: none;">
        <div class="module-title">演算結果 (Analysis)</div>
        <div id="prob-list"></div>
        <div id="winner-info"></div>
    </div>
</div>

<script>
    // 這裡維持原本的 JavaScript 數學邏輯
    const factorial = (n) => {
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    };

    function getMultinomialProb(n, probs, reqs) {
        const [p1, p2, p3] = probs;
        const [r1, r2, r3] = reqs;
        if (reqs.reduce((a, b) => a + b, 0) > n) return 0;
        let probSum = 0;
        for (let k1 = r1; k1 <= n - r2 - r3; k1++) {
            for (let k2 = r2; k2 <= n - k1 - r3; k2++) {
                let k3 = n - k1 - k2;
                let coef = factorial(n) / (factorial(k1) * factorial(k2) * factorial(k3));
                probSum += coef * Math.pow(p1, k1) * Math.pow(p2, k2) * Math.pow(p3, k3);
            }
        }
        return probSum;
    }

    function runCalculation() {
        const counts = document.getElementById('counts').value.trim().split(/\s+/).map(Number);
        const n = parseInt(document.getElementById('n_val').value);
        const reqLines = document.getElementById('requires').value.trim().split('\n').filter(l => l.trim());
        const baseProbs = counts.map(c => c / counts.reduce((a, b) => a + b, 0));

        let results = [];
        reqLines.forEach((line, i) => {
            const req = line.trim().split(/\s+/).map(Number);
            if (req.length === 3) {
                const p = getMultinomialProb(n, baseProbs, req);
                results.push({ p, label: `組合 ${i + 1} (${req.join('/')})` });
            }
        });

        const display = document.getElementById('result-display');
        const listDiv = document.getElementById('prob-list');
        const winnerDiv = document.getElementById('winner-info');
        
        display.style.display = 'block';
        listDiv.innerHTML = results.map(r => `
            <div class="result-row">
                <span>${r.label}</span>
                <span style="color: var(--accent-cyan)">${(r.p * 100).toFixed(2)}%</span>
            </div>
        `).join('');

        const maxP = Math.max(...results.map(r => r.p));
        const winners = results.filter(r => r.p === maxP).map(r => r.label);
        winnerDiv.innerHTML = `
            <div class="winner-panel">
                <div style="font-size: 0.75rem; color: var(--accent-cyan)">OPTIMAL OPTION</div>
                <div style="font-size: 1.1rem; margin-top: 5px">${maxP === 0 ? '無有效選項' : winners.join(' / ')}</div>
            </div>
        `;
    }
</script>
</body>
</html>
